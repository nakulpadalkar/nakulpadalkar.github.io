# Metadata stuff
pagetitle: "{{< meta title >}} | Nakul R. Padalkar"
author-meta: "Nakul R. Padalkar"


format:
  html:
    theme: 
      - assets/nrp.scss
    grid: 
      body-width: 900px
    toc: false
    code-link: true
    anchor-sections: true
    fig-cap-location: margin
    reference-location: margin
    footnotes-hover: true
    highlight-style: monokai


